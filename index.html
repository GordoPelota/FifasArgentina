<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gordo Computadora TV - Privado</title>
    <style>
        body { background-color: #0e0e10; color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #9146ff; margin-bottom: 20px; }
        
        .grid-principal { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 1200px; }
        
        /* Jitsi Meet (Contenido Prohibido) */
        .fuente-privada { width: 100%; aspect-ratio: 16 / 9; border-radius: 12px; border: 2px solid #333; overflow: hidden; background: #000; }
        
        /* Twitch + Chat */
        .seccion-twitch { display: grid; grid-template-columns: 1fr 350px; gap: 15px; width: 100%; }
        .portada-twitch { width: 100%; aspect-ratio: 16 / 9; border-radius: 8px; background: #000; }
        .chat-twitch { height: 100%; min-height: 400px; border-radius: 8px; border: none; }

        @media (max-width: 850px) {
            .seccion-twitch { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>Gordo Computadora TV</h1>

    <div class="grid-principal">
        <!-- 1. CONTENIDO PROHIBIDO (JITSI MEET) -->
        <div class="fuente-privada">
            <iframe 
                src="https://meet.jit.si/https://meet.jit.si/GordoPelota#config.startWithAudioMuted=true&config.startWithVideoMuted=false" 
                allow="camera; microphone; display-capture; fullscreen" 
                width="100%" 
                height="100%" 
                frameborder="0">
            </iframe>
        </div>

        <div class="seccion-twitch">
            <!-- 2. PORTADA DE TWITCH (LO QUE VE LA PLATAFORMA) -->
            <div id="twitch-video" class="portada-twitch"></div>

            <!-- 3. EL CHAT DE TWITCH (PARA LA COMUNIDAD) -->
            <iframe class="chat-twitch" 
                    src="https://www.twitch.tv/embed/gordocomputadora/chat?parent=gordopelota.github.io" 
                    width="100%">
            </iframe>
        </div>
    </div>

    <!-- Script para cargar el reproductor de Twitch -->
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
    <script type="text/javascript">
      new Twitch.Player("twitch-video", {
        channel: "gordocomputadora",
        width: "100%",
        height: "100%",
        parent: ["gordopelota.github.io"]
      });
    </script>

</body>
</html>
