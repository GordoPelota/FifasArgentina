<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gordo Computadora TV - Vivo</title>
    <style>
        body { background-color: #0e0e10; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #9146ff; font-size: 1.4rem; margin-bottom: 10px; }
        .grid-principal { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 1100px; }
        
        /* Contenedor del Reproductor Externo */
        .fuente-externa { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            border-radius: 12px; 
            border: 2px solid #9146ff; 
            overflow: hidden; 
            background: #000;
            position: relative;
        }

        /* Bloqueador de Publicidad básico del iframe */
        iframe { border: none; width: 100%; height: 100%; }

        .seccion-twitch { display: grid; grid-template-columns: 1fr 350px; gap: 10px; width: 100%; }
        .portada-twitch { width: 100%; aspect-ratio: 16 / 9; border-radius: 8px; background: #18181b; }
        .chat-twitch { height: 450px; border-radius: 8px; border: none; background: #18181b; }

        @media (max-width: 850px) {
            .seccion-twitch { grid-template-columns: 1fr; }
            h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <h1>Gordo Computadora TV - Transmisión Externa</h1>

    <div class="grid-principal">
        <!-- 1. REPRODUCTOR DE PELOTA LIBRE O SIMILAR -->
        <div class="fuente-externa">
            <iframe 
                src="https://esvideofy.com/ote.php?id=ps1" 
                allowfullscreen="true" 
                scrolling="no" 
                frameborder="0"
                sandbox="allow-scripts allow-same-origin allow-forms"
            ></iframe>
        </div>

        <div class="seccion-twitch">
            <!-- 2. TU PORTADA O STREAM DE TWITCH -->
            <div id="twitch-video" class="portada-twitch"></div>

            <!-- 3. CHAT DE TWITCH -->
            <iframe class="chat-twitch" 
                    src="https://www.twitch.tv/embed/gordocomputadora/chat?parent=gordopelota.github.io" 
                    width="100%">
            </iframe>
        </div>
    </div>

    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
    <script type="text/javascript">
      new Twitch.Player("twitch-video", {
        channel: "gordocomputadora",
        width: "100%",
        height: "100%",
        parent: ["gordopelota.github.io"]
      });
    </script>

</body>
</html>
